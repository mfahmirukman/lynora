<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lynora</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">Lynora</div>
        <div class="top-actions">
          <select id="env-select" title="Environment">
            <option value="">No environment</option>
          </select>
          <button type="button" id="btn-new-collection">New collection</button>
          <button type="button" id="btn-import">Import Postman</button>
          <button type="button" id="btn-import-openapi">Import OpenAPI</button>
          <button type="button" id="btn-import-proto">Import .proto</button>
          <input id="import-file" type="file" accept="application/json,.json" hidden />
          <input id="import-openapi-file" type="file" accept="application/json,.json" hidden />
          <input id="import-proto-file" type="file" accept=".proto" hidden />
        </div>
      </header>

      <div class="workspace">
        <aside class="sidebar">
          <div class="sidebar-label">Collections</div>
          <ul id="collection-list"></ul>
          <div class="sidebar-label">Requests</div>
          <ul id="request-list"></ul>
          <button type="button" id="btn-new-request" class="ghost">+ New request</button>
        </aside>

        <section class="editor">
          <div class="req-line">
            <select id="protocol">
              <option value="rest">REST</option>
              <option value="graphql">GraphQL</option>
              <option value="grpc">gRPC</option>
            </select>
            <select id="method">
              <option>GET</option>
              <option>POST</option>
              <option>PUT</option>
              <option>PATCH</option>
              <option>DELETE</option>
              <option>HEAD</option>
              <option>OPTIONS</option>
            </select>
            <input id="url" type="text" placeholder="https://api.example.com/{{path}}" />
            <button type="button" id="btn-send" class="primary">Send</button>
            <button type="button" id="btn-save">Save</button>
          </div>
          <input id="req-name" type="text" placeholder="Request name" />

          <div class="toolbar-row">
            <label>
              Auth
              <select id="auth-kind">
                <option value="none">None</option>
                <option value="bearer">Bearer</option>
                <option value="basic">Basic</option>
                <option value="apiKey">API Key</option>
                <option value="oauth2Pkce">OAuth2 PKCE</option>
                <option value="awsSigV4">AWS SigV4</option>
              </select>
            </label>
            <label>
              Export
              <select id="export-lang">
                <option value="curl">curl</option>
                <option value="fetch">fetch</option>
                <option value="reqwest">reqwest</option>
              </select>
            </label>
            <button type="button" id="btn-export">Copy snippet</button>
            <button type="button" id="btn-introspect" class="hidden">Introspect</button>
          </div>
          <input id="auth-token" type="text" placeholder="Token / API key / password" />
          <input id="auth-username" type="text" placeholder="Username / access key / client id" class="hidden" />
          <input id="auth-extra" type="text" placeholder="API key name / region / secret" class="hidden" />

          <label class="block-label">Headers (JSON array of {key,value,enabled})</label>
          <textarea id="headers" rows="3">[{"key":"Accept","value":"application/json","enabled":true}]</textarea>

          <div id="rest-body-pane">
            <label class="block-label">Body</label>
            <textarea id="body" rows="8" placeholder="{}"></textarea>
          </div>
          <div id="gql-pane" class="hidden">
            <label class="block-label">GraphQL query</label>
            <textarea id="gql-query" rows="8" placeholder="query { __typename }"></textarea>
            <label class="block-label">Variables (JSON)</label>
            <textarea id="gql-vars" rows="4" placeholder="{}"></textarea>
          </div>
          <div id="grpc-pane" class="hidden">
            <label class="block-label">Service</label>
            <input id="grpc-service" type="text" placeholder="helloworld.Greeter" />
            <label class="block-label">Method</label>
            <input id="grpc-method" type="text" placeholder="SayHello" />
            <label class="block-label">Message JSON</label>
            <textarea id="grpc-message" rows="8" placeholder='{"name":"Ada"}'></textarea>
          </div>
        </section>

        <section class="response">
          <div class="resp-meta">
            <span id="status">—</span>
            <span id="duration"></span>
          </div>
          <pre id="response-body" class="response-body">Send a request to see the response.</pre>
        </section>
      </div>
    </div>
  </body>
</html>
